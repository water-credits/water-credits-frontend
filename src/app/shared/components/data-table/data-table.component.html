<div class="data-table">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-dark-bg">
          <th
            *ngFor="let col of columns"
            [ngClass]="{
              'text-right': col.align === 'right',
              'text-center': col.align === 'center',
            }"
            class="px-4 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider"
            [style.width]="col.width"
          >
            <div
              class="flex items-center gap-1"
              [ngClass]="{
                'justify-end': col.align === 'right',
                'justify-center': col.align === 'center',
              }"
            >
              {{ col.label }}
              <button
                *ngIf="col.sortable"
                type="button"
                (click)="onHeaderClick(col)"
                class="sort-button text-slate-300 hover:text-slate-500"
                [attr.aria-label]="'Sort by ' + col.label"
              >
                <span
                  [class.opacity-0]="internalSortColumn !== col.key"
                  class="sort-indicator inline-flex"
                >
                  <svg
                    *ngIf="internalSortDirection === 'asc'"
                    class="w-3.5 h-3.5 table-sort-icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="18 15 12 9 6 15"></polyline>
                  </svg>
                  <svg
                    *ngIf="internalSortDirection === 'desc'"
                    class="w-3.5 h-3.5 table-sort-icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </span>
                <span *ngIf="internalSortColumn !== col.key" class="opacity-60">
                  <svg
                    class="w-3.5 h-3.5"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M3 6h18M7 12h10M11 18h2"></path>
                  </svg>
                </span>
              </button>
            </div>
          </th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngIf="loading">
          <tr class="border-b border-slate-100 dark:border-slate-700/50">
            <td [attr.colspan]="columns.length" class="px-4 py-6">
              <ng-container *ngFor="let _ of [].constructor(5); trackBy: trackBySkeleton">
                <div class="table-skeleton-line-wrapper py-3">
                  <div class="flex items-center gap-4">
                    <div
                      *ngFor="let col of columns"
                      class="flex-1 h-4 rounded bg-slate-200/70 dark:bg-slate-700/60"
                    ></div>
                  </div>
                </div>
              </ng-container>
            </td>
          </tr>
        </ng-container>
        <ng-container *ngIf="!loading && data.length === 0">
          <tr class="border-b border-slate-100 dark:border-slate-700/50">
            <td [attr.colspan]="columns.length" class="px-4 py-12">
              <app-empty-state [title]="emptyTitle" [message]="emptyMessage"></app-empty-state>
            </td>
          </tr>
        </ng-container>
        <ng-container *ngFor="let row of data; trackBy: trackByRow">
          <tr
            class="border-b border-slate-100 dark:border-slate-700/50 last:border-0"
            (click)="onRowClick(row)"
          >
            <td
              *ngFor="let col of columns"
              [ngClass]="{
                'text-right': col.align === 'right',
                'text-center': col.align === 'center',
              }"
              class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300"
            >
              <ng-container *ngIf="rowTemplate; else defaultCell">
                <ng-container
                  *ngTemplateOutlet="rowTemplate; context: { $implicit: row, column: col }"
                ></ng-container>
              </ng-container>
              <ng-template #defaultCell>
                {{ displayText(col, row) }}
              </ng-template>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>

  <app-pagination-controls
    *ngIf="pagination"
    [page]="pagination.page"
    [totalPages]="pagination.totalPages"
    [total]="pagination.total"
    [limit]="pagination.limit"
    (goToPage)="onPageSelected($event)"
  />
</div>
